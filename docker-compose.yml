services:
  backend:
    build:
      context: ./backend
    container_name: claro-pedidos-backend
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: "12345678901234567890123456789012"
      JWT_EXPIRATION: "3600000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    container_name: claro-pedidos-frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
