spring:
  application:
    name: desafio-pedidos

  datasource:
    url: jdbc:h2:mem:desafiopedidos
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      encoding: UTF-8

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus

  endpoint:
    health:
      show-details: always

  info:
    env:
      enabled: true

info:
  application:
    name: Desafio Pedidos
    description: API REST para gerenciamento de pedidos de e-commerce
    version: 1.0.0

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:3600000}
    issuer: desafio-pedidos-api

logging:
  level:
    root: INFO
    com.claro.desafiopedidos: DEBUG
    org.hibernate.SQL: DEBUG